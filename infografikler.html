<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İnfografikler — Saymanlık — Basamak GYS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10243E; --teal:#0E9E97; --teal-dark:#0B7F79; --amber:#F5A623;
    --coral:#FF6B5D; --violet:#8B6BF2; --pink:#EC6FA0;
    --cloud:#F3F7F9; --white:#FFFFFF; --mist:#E1EAEE; --slate:#5B7186;
    --radius-lg:22px; --radius-md:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cloud);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Sora',system-ui,-apple-system,sans-serif;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 6vw;background:var(--white);border-bottom:1px solid var(--mist);position:sticky;top:0;z-index:10;}
  .crumb{display:flex;align-items:center;gap:10px;font-size:0.88rem;color:var(--slate);font-weight:600;flex-wrap:wrap;}
  .crumb .cur{color:var(--ink);}
  .crumb .sep{opacity:0.5;}
  .add-btn{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;padding:9px 18px;border-radius:100px;font-weight:700;font-size:0.85rem;}

  .page-hero{padding:40px 6vw 8px;max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px;}
  .page-hero .icon{
    width:58px;height:58px;border-radius:16px;flex-shrink:0;
    background:linear-gradient(135deg,var(--violet),#7C5CE0);
    display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:white;
  }
  .page-hero h1{font-size:clamp(1.5rem,3vw,2rem);margin:0 0 4px;}
  .page-hero p{margin:0;color:var(--slate);font-size:0.95rem;}

  .content{max-width:1180px;margin:0 auto;padding:36px 6vw 90px;}

  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
  .g-card{
    background:var(--white);border:1px solid var(--mist);border-radius:var(--radius-lg);
    overflow:hidden;display:flex;flex-direction:column;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .g-card:hover{transform:translateY(-3px);box-shadow:0 16px 30px -16px rgba(16,36,62,0.2);}
  .g-thumb{display:block;aspect-ratio:1500/1000;background:var(--cloud);overflow:hidden;}
  .g-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .g-info{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px;flex-grow:1;}
  .g-tag{
    align-self:flex-start;font-size:0.68rem;font-weight:700;letter-spacing:0.04em;
    padding:4px 10px;border-radius:100px;background:rgba(14,158,151,0.12);color:var(--teal-dark);
  }
  .g-info h3{margin:0;font-size:0.98rem;line-height:1.35;}
  .g-actions{display:flex;gap:8px;margin-top:auto;}
  .g-btn{
    flex:1;text-align:center;padding:9px 10px;border-radius:100px;font-weight:700;font-size:0.82rem;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
  }
  .g-btn.view{background:var(--cloud);color:var(--ink);}
  .g-btn.download{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;}
  .g-btn svg{width:14px;height:14px;flex-shrink:0;}

  .empty-card{
    background:var(--white);border:1.5px dashed var(--mist);border-radius:var(--radius-lg);
    padding:48px 24px;text-align:center;color:var(--slate);
  }
  .empty-card .big-icon{font-size:2.4rem;margin-bottom:12px;}
  .empty-card h3{color:var(--ink);margin:0 0 8px;font-size:1.1rem;}
  .empty-card p{margin:0 0 18px;font-size:0.92rem;}
  .empty-card a.cta{
    display:inline-flex;padding:12px 24px;border-radius:100px;
    background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;font-weight:700;font-size:0.9rem;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="crumb">
    <a href="index.html">Basamak GYS</a><span class="sep">/</span>
    <a href="saymanlik.html">Saymanlık</a><span class="sep">/</span>
    <span class="cur">İnfografikler</span>
  </div>
  <a class="add-btn" href="icerik-ekle.html">+ İçerik Ekle</a>
</div>

<section class="page-hero">
  <div class="icon">🧠</div>
  <div>
    <h1>Saymanlık İnfografikleri</h1>
    <p>Kendi konu anlatımı notlarını görsel veya PDF olarak ekle.</p>
  </div>
</section>

<div class="content">
  <div id="ownKonuGrid" class="gallery-grid"></div>
  <div id="ownKonuEmpty" class="empty-card" style="display:none;">
    <div class="big-icon">📥</div>
    <h3>Henüz konu notu eklemedin</h3>
    <p>İnfografik görsel veya PDF olarak konu anlatımlarını buraya ekleyebilirsin.</p>
    <a class="cta" href="icerik-ekle.html">+ İçerik Ekle</a>
  </div>
</div>

<script src="db.js"></script>
<script>
  async function renderOwnKonular() {
    const items = await bgysGetAll('konular');
    const grid = document.getElementById('ownKonuGrid');
    const empty = document.getElementById('ownKonuEmpty');
    if (items.length === 0) { empty.style.display = 'block'; grid.style.display = 'none'; return; }
    empty.style.display = 'none'; grid.style.display = 'grid';
    grid.innerHTML = items.reverse().map(it => `
      <div class="g-card">
        ${it.tip === 'image'
          ? `<a class="g-thumb" href="${it.dataUrl}" target="_blank"><img src="${it.dataUrl}" alt="${it.baslik}"></a>`
          : `<a class="g-thumb" href="${it.dataUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--cloud);">📄</a>`}
        <div class="g-info">
          <span class="g-tag">${it.bolum}</span>
          <h3>${it.baslik}</h3>
          <div class="g-actions">
            <a class="g-btn view" href="${it.dataUrl}" target="_blank">Büyüt</a>
            <a class="g-btn download" href="${it.dataUrl}" download="${it.fileName || it.baslik}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
              İndir
            </a>
          </div>
        </div>
      </div>
    `).join('');
  }
  renderOwnKonular();
</script>

</body>
</html>
